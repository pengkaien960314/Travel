<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f766e">
    <title>光旅 Lumina Voyage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="max-w-[420px] mx-auto min-h-screen bg-slate-50 dark:bg-slate-900 transition-colors duration-300 relative pb-24">

    <header class="px-6 pt-6 flex items-center justify-between bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 transition-colors duration-300">
        <div class="flex items-center">
            <span class="text-3xl">✨</span>
            <span class="text-2xl font-bold text-teal-700 dark:text-teal-400 ml-1 tracking-wider">光旅</span>
        </div>
        
        <div class="flex items-center gap-x-5">
            <div class="relative cursor-pointer hover:scale-110 transition">
                <i class="fa-solid fa-bell text-xl text-slate-600 dark:text-slate-300"></i>
                <span class="absolute -top-1 -right-1 bg-rose-500 text-[9px] text-white font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-900">3</span>
            </div>

            <div class="relative">
                <div id="avatar-btn" class="flex items-center cursor-pointer hover:opacity-80 transition">
                    <img id="avatar-img" src="https://api.dicebear.com/7.x/initials/svg?seed=User&backgroundColor=slate" class="w-9 h-9 rounded-full shadow-sm border-2 border-slate-200 dark:border-slate-700" alt="Avatar">
                </div>

                <div id="profile-popup" class="hidden absolute top-12 right-0 w-64 bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-4 transform transition-all z-50 origin-top-right">
                    
                    <div id="logged-out-menu" class="block">
                        <div class="text-center mb-4">
                            <h3 class="font-bold text-slate-800 dark:text-white text-sm">歡迎來到光旅</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">登入以解鎖專屬 AI 推薦行程</p>
                        </div>
                        <button id="open-login-btn" class="w-full py-2 bg-teal-600 text-white text-sm font-bold rounded-xl hover:bg-teal-700 transition mb-3">
                            立即登入 / 註冊
                        </button>
                    </div>

                    <div id="logged-in-menu" class="hidden">
                        <div class="flex items-center gap-3 mb-4 pb-4 border-b border-slate-100 dark:border-slate-700">
                            <img id="popup-avatar" src="" class="w-10 h-10 rounded-full" alt="Avatar">
                            <div>
                                <div id="user-name-display" class="font-bold text-slate-800 dark:text-white text-sm"></div>
                                <div id="user-email-display" class="text-xs text-slate-500 dark:text-slate-400"></div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-3 p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition text-slate-700 dark:text-slate-200 text-sm">
                                <i class="fa-solid fa-gear"></i><span>帳號設定</span>
                            </div>
                            <button id="logout-btn" class="mt-2 w-full py-2 bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 text-sm font-bold rounded-xl hover:bg-rose-100 dark:hover:bg-rose-900/50 transition">
                                登出帳號
                            </button>
                        </div>
                    </div>

                    <div class="mt-2 pt-2 border-t border-slate-100 dark:border-slate-700">
                        <div class="flex items-center justify-between p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition" id="theme-toggle">
                            <div class="flex items-center gap-3 text-slate-700 dark:text-slate-200 text-sm">
                                <i class="fa-solid fa-moon dark:hidden text-indigo-500"></i>
                                <i class="fa-solid fa-sun hidden dark:block text-amber-400"></i>
                                <span>切換外觀</span>
                            </div>
                            <div class="w-10 h-5 bg-slate-300 dark:bg-teal-600 rounded-full relative transition-colors">
                                <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-transform duration-300 dark:translate-x-5 shadow-sm"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </header>

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity opacity-0">
        <div class="bg-white dark:bg-slate-800 w-[90%] max-w-[340px] rounded-3xl p-6 relative shadow-2xl transform scale-95 transition-transform duration-300" id="auth-modal-content">
            
            <button id="close-modal-btn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>

            <div id="login-form-view" class="block">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">歡迎回來 👋</h2>
                <form id="login-form" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">電子郵件 / 帳號</label>
                        <input type="email" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:focus:border-teal-400 transition dark:text-white" placeholder="輸入您的帳號">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">密碼</label>
                        <input type="password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:focus:border-teal-400 transition dark:text-white" placeholder="輸入密碼">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl mt-2 hover:bg-teal-700 transition shadow-lg shadow-teal-600/30">
                        登入
                    </button>
                </form>
                
                <div class="mt-5 text-center text-sm text-slate-500 dark:text-slate-400">
                    還沒有帳號嗎？ <button id="go-to-register" class="text-teal-600 dark:text-teal-400 font-bold hover:underline">建立新帳號</button>
                </div>

                <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
                    <p class="text-center text-xs text-slate-400 mb-4">或使用以下方式登入</p>
                    <div class="flex flex-col gap-3">
                        <button class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 font-medium py-2.5 rounded-xl hover:bg-slate-50 transition shadow-sm">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                            使用 Google 登入
                        </button>
                        <button class="w-full flex items-center justify-center gap-3 bg-[#1877F2] text-white font-medium py-2.5 rounded-xl hover:bg-[#0C63D4] transition shadow-sm">
                            <i class="fa-brands fa-facebook text-lg"></i>
                            使用 Facebook 登入
                        </button>
                    </div>
                </div>
            </div>

            <div id="register-form-view" class="hidden">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">建立新帳號 ✨</h2>
                <form id="register-form" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">使用者名稱</label>
                        <input type="text" id="reg-name" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:focus:border-teal-400 transition dark:text-white" placeholder="例如：彭楷恩">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">電子郵件</label>
                        <input type="email" id="reg-email" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:focus:border-teal-400 transition dark:text-white" placeholder="輸入您的 Email">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">設定密碼</label>
                        <input type="password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:focus:border-teal-400 transition dark:text-white" placeholder="至少 6 個字元">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 dark:bg-white text-white dark:text-slate-900 font-bold py-3 rounded-xl mt-2 hover:bg-slate-700 dark:hover:bg-slate-100 transition shadow-lg">
                        註冊並登入
                    </button>
                </form>
                
                <div class="mt-5 text-center text-sm text-slate-500 dark:text-slate-400">
                    已經有帳號了？ <button id="go-to-login" class="text-teal-600 dark:text-teal-400 font-bold hover:underline">返回登入</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
