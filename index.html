<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f766e">
    <title>光旅 Lumina Voyage</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=180&h=180&fit=crop">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="max-w-[420px] mx-auto min-h-screen bg-slate-50 relative pb-24">

    <header class="px-6 pt-6 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center">
            <span class="text-3xl">✨</span>
            <span class="text-2xl font-bold text-teal-700 ml-1 tracking-wider">光旅</span>
            <span class="text-sm font-light text-amber-500 ml-2 mt-1">LUMINA</span>
        </div>
        <div class="flex items-center gap-x-4">
            <div class="flex items-center cursor-pointer">
                <div class="text-right pr-2 hidden sm:block">
                    <div class="text-sm font-semibold text-slate-700">彭楷恩</div>
                    <div class="text-emerald-500 text-[10px]">VIP 金光</div>
                </div>
                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Kai&backgroundColor=0f766e" class="w-9 h-9 rounded-full shadow-sm border border-slate-200" alt="Avatar">
            </div>
            <div class="relative cursor-pointer hover:scale-110 transition">
                <i class="fa-solid fa-bell text-xl text-slate-600"></i>
                <span class="absolute -top-1 -right-1 bg-rose-500 text-[9px] text-white font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">3</span>
            </div>
        </div>
    </header>

    <section class="hero-bg h-72 flex flex-col justify-end px-6 pb-8 text-white relative mt-[-80px] pt-24 rounded-b-[40px] shadow-sm">
        <div class="z-10">
            <h1 class="text-3xl font-light drop-shadow-md">晚安，想去哪？</h1>
            <p class="text-lg font-medium mt-1 text-slate-100 drop-shadow-md">今天適合找個地方看日落</p>
        </div>
        
        <div id="search-bar" class="z-10 mt-6 glass text-slate-700 rounded-3xl px-5 py-4 flex items-center shadow-lg cursor-pointer transition-transform hover:scale-[1.02]">
            <i class="fa-solid fa-magnifying-glass text-teal-700 text-xl"></i>
            <span class="flex-1 text-sm ml-3 text-slate-500">下一站，去哪裡看夕陽？</span>
            <button id="voice-btn" class="bg-teal-700 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-teal-600 transition shadow-md">
                <i class="fa-solid fa-microphone text-sm"></i>
            </button>
        </div>
    </section>

    <section class="px-6 mt-6">
        <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-3 grid grid-cols-4 gap-2">
            <div class="quick-nav-item"><i class="fa-solid fa-plane text-2xl text-teal-600"></i><span>機票</span></div>
            <div class="quick-nav-item"><i class="fa-solid fa-bed text-2xl text-teal-600"></i><span>旅宿</span></div>
            <div class="quick-nav-item"><i class="fa-solid fa-map-location-dot text-2xl text-teal-600"></i><span>行程</span></div>
            <div class="quick-nav-item"><i class="fa-solid fa-ticket text-2xl text-teal-600"></i><span>票券</span></div>
        </div>
    </section>

    <section class="px-6 mt-8">
        <div class="flex justify-between items-end mb-4">
            <h2 class="font-bold text-lg text-slate-800">為你推薦 <span class="text-amber-500 text-xs ml-1 font-normal bg-amber-50 px-2 py-1 rounded-full">✨ AI 嚴選</span></h2>
            <a href="#" class="text-teal-600 text-xs font-medium hover:underline">查看全部 <i class="fa-solid fa-chevron-right ml-0.5"></i></a>
        </div>
        <div id="feed-container" class="grid grid-cols-2 gap-4">
            </div>
    </section>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] bg-white border-t border-slate-100 flex items-center justify-between px-6 py-3 text-[10px] z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
        <div class="nav-item active"><i class="fa-solid fa-compass text-2xl mb-1"></i><span>探索</span></div>
        <div class="nav-item"><i class="fa-solid fa-lightbulb text-2xl mb-1 text-slate-300"></i><span class="text-slate-400">靈感</span></div>
        
        <div class="relative -top-6">
            <div class="w-14 h-14 bg-gradient-to-tr from-teal-700 to-teal-400 text-white rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(15,118,110,0.4)] text-2xl border-4 border-slate-50 cursor-pointer hover:scale-110 transition-transform">
                <i class="fa-solid fa-plus"></i>
            </div>
        </div>
        
        <div class="nav-item"><i class="fa-solid fa-calendar-check text-2xl mb-1 text-slate-300"></i><span class="text-slate-400">行程</span></div>
        <div class="nav-item"><i class="fa-regular fa-user text-2xl mb-1 text-slate-300"></i><span class="text-slate-400">我的</span></div>
    </nav>

    <script type="module" src="main.js"></script>

</body>
</html>
