<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f766e">
    <title>光旅 Lumina Voyage</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="max-w-[420px] mx-auto min-h-screen bg-slate-50 dark:bg-slate-900 transition-colors duration-300 relative pb-24">

    <header class="px-6 pt-6 flex items-center justify-between bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 transition-colors duration-300">
        <div class="flex items-center">
            <span class="text-3xl">✨</span>
            <span class="text-2xl font-bold text-teal-700 dark:text-teal-400 ml-1 tracking-wider">光旅</span>
        </div>
        
        <div class="flex items-center gap-x-5">
            <div class="relative cursor-pointer hover:scale-110 transition">
                <i class="fa-solid fa-bell text-xl text-slate-600 dark:text-slate-300"></i>
                <span class="absolute -top-1 -right-1 bg-rose-500 text-[9px] text-white font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-900">3</span>
            </div>

            <div class="relative">
                <div id="avatar-btn" class="flex items-center cursor-pointer hover:opacity-80 transition">
                    <img id="avatar-img" src="https://api.dicebear.com/7.x/initials/svg?seed=User&backgroundColor=slate" class="w-9 h-9 rounded-full shadow-sm border-2 border-slate-200 dark:border-slate-700" alt="Avatar">
                </div>

                <div id="profile-popup" class="hidden absolute top-12 right-0 w-64 bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700 p-4 transform transition-all z-50 origin-top-right">
                    
                    <div id="logged-out-menu" class="block">
                        <div class="text-center mb-4">
                            <h3 class="font-bold text-slate-800 dark:text-white text-sm">歡迎來到光旅</h3>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">登入以解鎖專屬 AI 推薦行程</p>
                        </div>
                        <button id="open-login-btn" class="w-full py-2 bg-teal-600 text-white text-sm font-bold rounded-xl hover:bg-teal-700 transition mb-3">
                            立即登入 / 註冊
                        </button>
                    </div>

                    <div id="logged-in-menu" class="hidden">
                        <div class="flex items-center gap-3 mb-4 pb-4 border-b border-slate-100 dark:border-slate-700">
                            <img id="popup-avatar" src="" class="w-10 h-10 rounded-full" alt="Avatar">
                            <div>
                                <div id="user-name-display" class="font-bold text-slate-800 dark:text-white text-sm"></div>
                                <div id="user-email-display" class="text-xs text-slate-500 dark:text-slate-400"></div>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-3 p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition text-slate-700 dark:text-slate-200 text-sm">
                                <i class="fa-solid fa-gear"></i><span>帳號設定</span>
                            </div>
                            <button id="logout-btn" class="mt-2 w-full py-2 bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 text-sm font-bold rounded-xl hover:bg-rose-100 dark:hover:bg-rose-900/50 transition">
                                登出帳號
                            </button>
                        </div>
                    </div>

                    <div class="mt-2 pt-2 border-t border-slate-100 dark:border-slate-700">
                        <div class="flex items-center justify-between p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg cursor-pointer transition" id="theme-toggle">
                            <div class="flex items-center gap-3 text-slate-700 dark:text-slate-200 text-sm">
                                <i class="fa-solid fa-moon dark:hidden text-indigo-500"></i>
                                <i class="fa-solid fa-sun hidden dark:block text-amber-400"></i>
                                <span>切換外觀</span>
                            </div>
                            <div class="w-10 h-5 bg-slate-300 dark:bg-teal-600 rounded-full relative transition-colors">
                                <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full transition-transform duration-300 dark:translate-x-5 shadow-sm"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-bg h-72 flex flex-col justify-end px-6 pb-8 text-white relative mt-[-80px] pt-24 rounded-b-[40px] shadow-sm">
        <div class="z-10">
            <h1 class="text-3xl font-light drop-shadow-md">晚安，想去哪？</h1>
            <p class="text-lg font-medium mt-1 text-slate-100 drop-shadow-md">今天適合找個地方看日落</p>
        </div>
        
        <div id="search-bar" class="z-10 mt-6 glass text-slate-700 dark:text-slate-200 rounded-3xl px-5 py-4 flex items-center shadow-lg cursor-pointer transition-transform hover:scale-[1.02]">
            <i class="fa-solid fa-magnifying-glass text-teal-700 dark:text-teal-400 text-xl"></i>
            <span class="flex-1 text-sm ml-3 text-slate-500 dark:text-slate-300">下一站，去哪裡看夕陽？</span>
            <button id="voice-btn" class="bg-teal-700 dark:bg-teal-600 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-teal-600 dark:hover:bg-teal-500 transition shadow-md">
                <i class="fa-solid fa-microphone text-sm"></i>
            </button>
        </div>
    </section>

    <section class="px-6 mt-6">
        <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none p-3 grid grid-cols-4 gap-2 transition-colors duration-300 border border-transparent dark:border-slate-700">
            <div class="hover:bg-slate-50 dark:hover:bg-slate-700 flex flex-col items-center py-3 rounded-2xl cursor-pointer transition-all">
                <i class="fa-solid fa-plane text-2xl text-teal-600 dark:text-teal-400"></i>
                <span class="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">機票</span>
            </div>
            <div class="hover:bg-slate-50 dark:hover:bg-slate-700 flex flex-col items-center py-3 rounded-2xl cursor-pointer transition-all">
                <i class="fa-solid fa-bed text-2xl text-teal-600 dark:text-teal-400"></i>
                <span class="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">旅宿</span>
            </div>
            <div class="hover:bg-slate-50 dark:hover:bg-slate-700 flex flex-col items-center py-3 rounded-2xl cursor-pointer transition-all">
                <i class="fa-solid fa-map-location-dot text-2xl text-teal-600 dark:text-teal-400"></i>
                <span class="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">行程</span>
            </div>
            <div class="hover:bg-slate-50 dark:hover:bg-slate-700 flex flex-col items-center py-3 rounded-2xl cursor-pointer transition-all">
                <i class="fa-solid fa-ticket text-2xl text-teal-600 dark:text-teal-400"></i>
                <span class="text-[11px] font-medium text-slate-600 dark:text-slate-300 mt-1">票券</span>
            </div>
        </div>
    </section>

    <section class="px-6 mt-8">
        <div class="flex justify-between items-end mb-4">
            <h2 class="font-bold text-lg text-slate-800 dark:text-white transition-colors">為你推薦 <span class="text-amber-500 dark:text-amber-400 text-xs ml-1 font-normal bg-amber-50 dark:bg-amber-900/30 px-2 py-1 rounded-full">✨ AI 嚴選</span></h2>
        </div>
        <div id="feed-container" class="grid grid-cols-2 gap-4">
            </div>
    </section>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 flex items-center justify-between px-6 py-3 text-[10px] z-30 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] transition-colors duration-300">
        <div class="flex flex-col items-center cursor-pointer text-teal-700 dark:text-teal-400">
            <i class="fa-solid fa-compass text-2xl mb-1"></i>
            <span class="font-bold">探索</span>
        </div>
        <div class="flex flex-col items-center cursor-pointer text-slate-300 dark:text-slate-500">
            <i class="fa-solid fa-lightbulb text-2xl mb-1"></i>
            <span>靈感</span>
        </div>
        <div class="relative -top-6">
            <div class="w-14 h-14 bg-gradient-to-tr from-teal-700 to-teal-400 text-white rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(15,118,110,0.4)] text-2xl border-4 border-slate-50 dark:border-slate-900 cursor-pointer">
                <i class="fa-solid fa-plus"></i>
            </div>
        </div>
        <div class="flex flex-col items-center cursor-pointer text-slate-300 dark:text-slate-500">
            <i class="fa-solid fa-calendar-check text-2xl mb-1"></i>
            <span>行程</span>
        </div>
        <div class="flex flex-col items-center cursor-pointer text-slate-300 dark:text-slate-500">
            <i class="fa-regular fa-user text-2xl mb-1"></i>
            <span>我的</span>
        </div>
    </nav>

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity opacity-0">
        <div class="bg-white dark:bg-slate-800 w-[90%] max-w-[340px] rounded-3xl p-6 relative shadow-2xl transform scale-95 transition-transform duration-300" id="auth-modal-content">
            
            <button id="close-modal-btn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white transition">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>

            <div id="login-form-view" class="block">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">歡迎回來 👋</h2>
                <form id="login-form" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">電子郵件 / 帳號</label>
                        <input type="email" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:text-white" placeholder="輸入您的帳號">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">密碼</label>
                        <input type="password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:text-white" placeholder="輸入密碼">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl mt-2 hover:bg-teal-700 transition shadow-lg shadow-teal-600/30">
                        登入
                    </button>
                </form>
                
                <div class="mt-5 text-center text-sm text-slate-500 dark:text-slate-400">
                    還沒有帳號嗎？ <button id="go-to-register" class="text-teal-600 dark:text-teal-400 font-bold hover:underline">建立新帳號</button>
                </div>
            </div>

            <div id="register-form-view" class="hidden">
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-6">建立新帳號 ✨</h2>
                <form id="register-form" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">使用者名稱</label>
                        <input type="text" id="reg-name" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:text-white" placeholder="例如：彭楷恩">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">電子郵件</label>
                        <input type="email" id="reg-email" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:text-white" placeholder="輸入您的 Email">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">設定密碼</label>
                        <input type="password" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal-500 dark:text-white" placeholder="至少 6 個字元">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 dark:bg-white text-white dark:text-slate-900 font-bold py-3 rounded-xl mt-2 hover:bg-slate-700 transition shadow-lg">
                        註冊並登入
                    </button>
                </form>
                
                <div class="mt-5 text-center text-sm text-slate-500 dark:text-slate-400">
                    已經有帳號了？ <button id="go-to-login" class="text-teal-600 dark:text-teal-400 font-bold hover:underline">返回登入</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
